apiVersion: v1
kind: Service
metadata:
  name: kafka-redis-status-service
  labels:
    app: kafka-redis-status-service
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    name: http
  - port: 8081
